# Training config read by src/train.py, src/optimizer_Factory.py, src/loss_func.py.
# Note: dt, data path, and loss are normally passed on the CLI to main.py;
# the `loss` key below is only a fallback when no --loss is given.
seed: 42
optimize:
  optimizer: Adam
  lr: 0.001
train:
  epochs: 500
loss: latent_loss      # fallback loss (latent_loss = 1-step; latent_loss_multistep = multi-step)
log_wandb: False       # set True and run `wandb login` to log to Weights & Biases
